# Portainer: только pull образа с GitHub Actions (GHCR). Без build: — иначе на части хостов/прокси
# BuildKit ломается с ошибкой http2 frame too large (прокси отдаёт HTTP/1.1 вместо gRPC).
#
# Локальная сборка: docker compose -f docker-compose.build.yml build && docker compose -f docker-compose.build.yml up
#
# Переменные стека: BEGET_LOGIN, BEGET_PASSWORD. Опционально PUBLISH_PORT.
# Приватный GHCR: Portainer → Registries → ghcr.io + GitHub PAT (read:packages).

services:
  beget-mail:
    image: ghcr.io/sereza111/webcontol_mail:latest
    pull_policy: always
    container_name: beget-mail
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${PUBLISH_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      BEGET_LOGIN: ${BEGET_LOGIN}
      BEGET_PASSWORD: ${BEGET_PASSWORD}
      SQLITE_PATH: /data/mailboxes.db
    volumes:
      - beget-mail-data:/data

volumes:
  beget-mail-data:
